# Shared defaults for this repository.
# Keep secrets out of this file. Use env vars or config/price_search.local.toml instead.

# subscription
[claude]
provider = "subscription" # `bedrock` / `anthropic` / `subscription` / `openrouter`
primary_model = "claude-sonnet-4-6"
small_model = "claude-haiku-4-5"

# bedrock
# [claude]
# provider = "bedrock" # `bedrock` / `anthropic` / `subscription` / `openrouter`
# primary_model = "global.anthropic.claude-sonnet-4-6"
# primary_model_capabilities = "effort,max_effort,thinking,adaptive_thinking,interleaved_thinking"
# small_model = "global.anthropic.claude-haiku-4-5-20251001-v1:0"
# small_model_capabilities = "max_effort,thinking"
#
# [aws]
# region = "ap-northeast-1"
# profile = "default"

# openrouter
# [claude]
# provider = "openrouter" # `bedrock` / `anthropic` / `subscription` / `openrouter`
# primary_model = "openai/gpt-5.4-mini"
# small_model = "z-ai/glm-5-turbo"

[agent]
thinking_type = "enabled"
thinking_budget_tokens = 4096
effort = "high"
max_turns = 999
max_offers = 3

[market]
code = "JP"
currency = "JPY"

[output]
agent_activity_log_dir = "logs"
result_output_dir = "out"

[searxng]
search_url = "http://127.0.0.1:18888/search"
engines = ["brave", "google", "duckduckgo"]
language = "ja-JP"
result_limit = 8

[workspace]
root = "."
