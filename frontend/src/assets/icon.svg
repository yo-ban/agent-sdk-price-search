<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="lens-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4c1d95" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Highlight gloss top-left -->
  <ellipse cx="170" cy="140" rx="180" ry="130" fill="white" fill-opacity="0.07"/>

  <!-- Magnifying glass group -->
  <g filter="url(#shadow)">
    <!-- Lens fill (glass effect) -->
    <circle cx="208" cy="208" r="122" fill="url(#lens-fill)" stroke="white" stroke-width="0"/>

    <!-- Lens ring -->
    <circle cx="208" cy="208" r="122" fill="none" stroke="white" stroke-width="44" stroke-opacity="0.95"/>

    <!-- Handle -->
    <line x1="304" y1="304" x2="404" y2="404" stroke="white" stroke-width="46" stroke-linecap="round" stroke-opacity="0.95"/>
  </g>

  <!-- ¥ symbol centered in lens -->
  <text
    x="208" y="208"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="132"
    font-weight="800"
    fill="white"
    fill-opacity="0.95"
    letter-spacing="-2"
  >¥</text>
</svg>
