[project]
name = "price-search-core"
version = "0.1.0"
description = "Core product price research package powered by Claude Agent SDK."
readme = "../../README.md"
requires-python = ">=3.11"
dependencies = [
  "claude-agent-sdk==0.1.53",
  "mcp==1.26.0",
  "Pillow==12.1.1",
]

[project.scripts]
price-search = "price_search.handler.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/price_search"]
